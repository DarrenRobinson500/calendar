[build]
builder = "nixpacks"
buildCommand = "cd frontend && npm install && npx vite build && cd ../backend && pip install -r requirements.txt"

[deploy]
startCommand = "cd backend && python manage.py migrate && python manage.py collectstatic --noinput && gunicorn calproject.wsgi --bind 0.0.0.0:$PORT"
healthcheckPath = "/api/todos/"
