[build]
builder = "nixpacks"
buildCommand = "cd frontend && npm install && npm run build && cd ../backend && python3 -m pip install -r requirements.txt"

[deploy]
startCommand = "cd backend && python3 manage.py migrate && python3 manage.py collectstatic --noinput && python3 -m gunicorn calproject.wsgi --bind 0.0.0.0:$PORT"
healthcheckPath = "/api/todos/"
